<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" role="img" aria-labelledby="t-ads d-ads">
  <title id="t-ads">ADS7952 12-channel SAR ADC, Auto-1 sequencing, 16-bit SPI frame layout</title>
  <desc id="d-ads">12 analog inputs CH0..CH11 multiplexed into a single SAR core. Each SPI transaction is exactly 16 bits, full-duplex: write next-conversion command on MOSI, read previous conversion result on MISO.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .panelL   { fill: #ffffff; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .ch       { fill: #ebf4ff; stroke: #2c5282; stroke-width: 1.6; }
      .ch-act   { fill: #c6f6d5; stroke: #276749; stroke-width: 1.8; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .field-cmd  { fill: #fed7d7; stroke: #c53030; stroke-width: 1.4; }
      .field-data { fill: #c6f6d5; stroke: #276749; stroke-width: 1.4; }
      .field-mode { fill: #bee3f8; stroke: #2c5282; stroke-width: 1.4; }
      .field-rsv  { fill: #f4f6f8; stroke: #4a5568; stroke-width: 1.4; }
      .wire-spi { stroke: #2b6cb0; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .wire-ana { stroke: #4a5568; stroke-width: 2; fill: none; stroke-linecap: round; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .titleL   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: start; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
      .smallL   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: start; }
      .pin      { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 11px; fill: #1a202c; text-anchor: middle; }
      .pinL     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 11px; fill: #1a202c; text-anchor: start; }
      .bit      { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #1a202c; text-anchor: middle; }
      .legend   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
    ]]></style>
    <marker id="ar-ads" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2b6cb0"/>
    </marker>
  </defs>
  <rect class="panel" width="880" height="540"/>

  <text class="head" x="440" y="26">ADS7952 - 12-channel 12-bit SAR ADC, Auto-1 sequencing</text>
  <text class="small" x="440" y="44">Each SPI frame is exactly 16 bits, full-duplex: write next-conversion command on MOSI, read previous conversion result on MISO.</text>

  <!-- Section 1: Channels + chip + SPI -->
  <rect class="panelL" x="20" y="62" width="840" height="180" rx="6"/>

  <!-- 12 channels in 2 columns of 6 -->
  <g>
    <rect class="ch-act" x="40" y="80"  width="60" height="22" rx="3"/><text class="title" x="70" y="96">CH0</text>
    <rect class="ch" x="40" y="106" width="60" height="22" rx="3"/><text class="title" x="70" y="122">CH1</text>
    <rect class="ch" x="40" y="132" width="60" height="22" rx="3"/><text class="title" x="70" y="148">CH2</text>
    <rect class="ch-act" x="40" y="158" width="60" height="22" rx="3"/><text class="title" x="70" y="174">CH3</text>
    <rect class="ch" x="40" y="184" width="60" height="22" rx="3"/><text class="title" x="70" y="200">CH4</text>
    <rect class="ch" x="40" y="210" width="60" height="22" rx="3"/><text class="title" x="70" y="226">CH5</text>

    <rect class="ch" x="110" y="80"  width="60" height="22" rx="3"/><text class="title" x="140" y="96">CH6</text>
    <rect class="ch-act" x="110" y="106" width="60" height="22" rx="3"/><text class="title" x="140" y="122">CH7</text>
    <rect class="ch" x="110" y="132" width="60" height="22" rx="3"/><text class="title" x="140" y="148">CH8</text>
    <rect class="ch" x="110" y="158" width="60" height="22" rx="3"/><text class="title" x="140" y="174">CH9</text>
    <rect class="ch" x="110" y="184" width="60" height="22" rx="3"/><text class="title" x="140" y="200">CH10</text>
    <rect class="ch-act" x="110" y="210" width="60" height="22" rx="3"/><text class="title" x="140" y="226">CH11</text>
  </g>

  <!-- Chip body (mux + SAR + range) -->
  <rect class="chip" x="220" y="80" width="380" height="146" rx="10"/>
  <text class="head" x="410" y="104">ADS7952</text>
  <text class="small" x="410" y="120">12 -> 1 input multiplexer &#183; SAR core &#183; 1 MSPS &#183; 12-bit</text>

  <rect class="ch" x="240" y="140" width="120" height="40" rx="6"/>
  <text class="title" x="300" y="158">12 -> 1 MUX</text>
  <text class="small" x="300" y="172">channel select</text>

  <rect class="ch" x="380" y="140" width="120" height="40" rx="6"/>
  <text class="title" x="440" y="158">SAR core</text>
  <text class="small" x="440" y="172">12-bit count</text>

  <rect class="ch" x="520" y="140" width="60" height="40" rx="6"/>
  <text class="title" x="550" y="160">Range</text>
  <text class="small" x="550" y="173">x1 / x2</text>

  <text class="small" x="410" y="200">Manual / Auto-1 (mask) / Auto-2 (CH0..CH_last) modes &#183; 4 GPIOs &#183; alarm thresholds</text>
  <text class="small" x="410" y="216">First conversion after power-up is invalid; driver discards it on EnsureInitialized().</text>

  <!-- Wires from inputs to mux (visual only) -->
  <g stroke-dasharray="2 3">
    <line class="wire-ana" x1="170" y1="91"  x2="240" y2="160"/>
    <line class="wire-ana" x1="170" y1="117" x2="240" y2="160"/>
    <line class="wire-ana" x1="170" y1="143" x2="240" y2="160"/>
    <line class="wire-ana" x1="170" y1="169" x2="240" y2="160"/>
    <line class="wire-ana" x1="170" y1="195" x2="240" y2="160"/>
    <line class="wire-ana" x1="170" y1="221" x2="240" y2="160"/>
  </g>

  <!-- SPI box -->
  <rect class="box" x="620" y="80" width="220" height="146" rx="6"/>
  <text class="title" x="730" y="104">MCU SPI</text>
  <text class="pinL" x="640" y="128">SCLK &#8804; 16 MHz</text>
  <text class="pinL" x="640" y="146">MOSI  (16-bit cmd)</text>
  <text class="pinL" x="640" y="164">MISO  (12-bit data + 4 tag)</text>
  <text class="pinL" x="640" y="182">CS</text>
  <text class="smallL" x="640" y="206">Up to 1 MSPS aggregate</text>
  <text class="smallL" x="640" y="220">throughput at 16 MHz SCLK</text>
  <line class="wire-spi" x1="600" y1="160" x2="620" y2="160" marker-end="url(#ar-ads)"/>

  <!-- Section 2: 16-bit MOSI command frame (left, y=260..380) -->
  <rect class="panelL" x="20" y="260" width="540" height="170" rx="6"/>
  <text class="title" x="290" y="280">16-bit MOSI command frame  (host -> ADC)</text>

  <g transform="translate(40, 290)">
    <!-- Bit cells: 16 cells, each 30 px wide => 480 px total -->
    <!-- MODE [15:12]: 4 cells -->
    <rect class="field-mode" x="0"   y="0" width="30" height="36"/>
    <rect class="field-mode" x="30"  y="0" width="30" height="36"/>
    <rect class="field-mode" x="60"  y="0" width="30" height="36"/>
    <rect class="field-mode" x="90"  y="0" width="30" height="36"/>
    <text class="bit" x="60" y="22">MODE [15:12]</text>

    <!-- EN [11] -->
    <rect class="field-cmd"  x="120" y="0" width="30" height="36"/>
    <text class="bit" x="135" y="22">EN</text>

    <!-- CH [10:7]: 4 cells -->
    <rect class="field-cmd"  x="150" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="180" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="210" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="240" y="0" width="30" height="36"/>
    <text class="bit" x="195" y="22">CH [10:7]</text>

    <!-- RNG [6] -->
    <rect class="field-cmd"  x="270" y="0" width="30" height="36"/>
    <text class="bit" x="285" y="22">RNG</text>

    <!-- PD [5] -->
    <rect class="field-cmd"  x="300" y="0" width="30" height="36"/>
    <text class="bit" x="315" y="22">PD</text>

    <!-- GPIO [4:1]: 4 cells -->
    <rect class="field-cmd"  x="330" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="360" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="390" y="0" width="30" height="36"/>
    <rect class="field-cmd"  x="420" y="0" width="30" height="36"/>
    <text class="bit" x="375" y="22">GPIO [4:1]</text>

    <!-- Reserved [0] -->
    <rect class="field-rsv"  x="450" y="0" width="30" height="36"/>
    <text class="bit" x="465" y="22">0</text>

    <!-- bit indices below -->
    <g transform="translate(0, 44)">
      <text class="small" x="15"  y="10">15</text>
      <text class="small" x="105" y="10">11</text>
      <text class="small" x="135" y="10">10</text>
      <text class="small" x="255" y="10">7</text>
      <text class="small" x="285" y="10">6</text>
      <text class="small" x="315" y="10">5</text>
      <text class="small" x="345" y="10">4</text>
      <text class="small" x="435" y="10">1</text>
      <text class="small" x="465" y="10">0</text>
    </g>
  </g>

  <!-- 16-bit MISO frame -->
  <text class="title" x="290" y="386">16-bit MISO frame  (ADC -> host)</text>
  <g transform="translate(40, 396)">
    <!-- TAG [15:12]: 4 cells -->
    <rect class="field-mode" x="0"   y="0" width="30" height="28"/>
    <rect class="field-mode" x="30"  y="0" width="30" height="28"/>
    <rect class="field-mode" x="60"  y="0" width="30" height="28"/>
    <rect class="field-mode" x="90"  y="0" width="30" height="28"/>
    <text class="bit" x="60" y="18">TAG [15:12]</text>

    <!-- DATA [11:0]: 12 cells -->
    <rect class="field-data" x="120" y="0" width="30" height="28"/>
    <rect class="field-data" x="150" y="0" width="30" height="28"/>
    <rect class="field-data" x="180" y="0" width="30" height="28"/>
    <rect class="field-data" x="210" y="0" width="30" height="28"/>
    <rect class="field-data" x="240" y="0" width="30" height="28"/>
    <rect class="field-data" x="270" y="0" width="30" height="28"/>
    <rect class="field-data" x="300" y="0" width="30" height="28"/>
    <rect class="field-data" x="330" y="0" width="30" height="28"/>
    <rect class="field-data" x="360" y="0" width="30" height="28"/>
    <rect class="field-data" x="390" y="0" width="30" height="28"/>
    <rect class="field-data" x="420" y="0" width="30" height="28"/>
    <rect class="field-data" x="450" y="0" width="30" height="28"/>
    <text class="bit" x="300" y="18">DATA [11:0]  &#183;  MSB first</text>
  </g>

  <!-- Auto-1 example panel (right of MOSI frame) -->
  <rect class="panelL" x="580" y="260" width="280" height="170" rx="6"/>
  <text class="title" x="720" y="280">Example Auto-1 channel mask</text>
  <text class="small" x="720" y="298">mask = 0x0889  ->  CH0, CH3, CH7, CH11</text>
  <text class="small" x="720" y="314">After EnterAuto1Mode() the chip cycles</text>
  <text class="small" x="720" y="328">enabled channels in ascending order.</text>

  <g transform="translate(600, 346)">
    <rect class="ch-act" x="0"   y="0" width="48" height="22" rx="3"/><text class="title" x="24"  y="16">CH0</text>
    <rect class="ch-act" x="60"  y="0" width="48" height="22" rx="3"/><text class="title" x="84"  y="16">CH3</text>
    <rect class="ch-act" x="120" y="0" width="48" height="22" rx="3"/><text class="title" x="144" y="16">CH7</text>
    <rect class="ch-act" x="180" y="0" width="48" height="22" rx="3"/><text class="title" x="204" y="16">CH11</text>
    <line class="wire-spi" x1="48"  y1="11" x2="60"  y2="11" marker-end="url(#ar-ads)"/>
    <line class="wire-spi" x1="108" y1="11" x2="120" y2="11" marker-end="url(#ar-ads)"/>
    <line class="wire-spi" x1="168" y1="11" x2="180" y2="11" marker-end="url(#ar-ads)"/>
  </g>
  <text class="smallL" x="600" y="394">ReadAllChannels() returns one struct after</text>
  <text class="smallL" x="600" y="408">N SPI frames (here N = 4); Auto-2 walks</text>
  <text class="smallL" x="600" y="422">CH0..CH_last sequentially instead.</text>

  <!-- Bottom legend in its own row -->
  <g transform="translate(40, 460)">
    <text class="titleL" x="0" y="0" fill="#1a365d">Legend</text>
    <rect class="ch" x="80"  y="-10" width="14" height="14"/>
    <text class="legend" x="100" y="0">Disabled channel</text>
    <rect class="ch-act" x="220" y="-10" width="14" height="14"/>
    <text class="legend" x="240" y="0">Enabled in current Auto-1 mask</text>
    <rect class="field-mode" x="440" y="-10" width="14" height="14"/>
    <text class="legend" x="460" y="0">Mode / TAG bits</text>
    <rect class="field-cmd"  x="580" y="-10" width="14" height="14"/>
    <text class="legend" x="600" y="0">Command bits</text>
    <rect class="field-data" x="700" y="-10" width="14" height="14"/>
    <text class="legend" x="720" y="0">Data bits</text>
  </g>
  <g transform="translate(40, 488)">
    <line class="wire-ana" x1="80"  y1="-3" x2="104" y2="-3" stroke-dasharray="2 3"/>
    <text class="legend" x="112" y="0">Analog input path (one channel selected at a time)</text>
    <line class="wire-spi" x1="440" y1="-3" x2="464" y2="-3" marker-end="url(#ar-ads)"/>
    <text class="legend" x="472" y="0">SPI control / Auto-1 sequence step</text>
  </g>
</svg>
